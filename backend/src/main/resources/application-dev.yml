# Development Environment Configuration
server:
  address: 127.0.0.1

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_wall
    username: ${DB_USERNAME:xiaobai}
    password: ${DB_PASSWORD:20040226Bx/}

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:20040226Bx/}

# MinIO Configuration (dev default)
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: campus-wall

# Enable SQL logging in development
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.campus.wall: debug

sa-token:
  token-style: random-128
  token-prefix: Bearer
  is-write-cookie: false

app:
  security:
    super-admin-role-key: admin

# CORS（开发环境）
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://*:*}
