server:
  port: 8080

spring:
  application:
    name: Nova-Campus

  # Database Configuration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/campus_wall
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campus.wall.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token Configuration
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false
  token-prefix: Bearer

# Knife4j API Documentation
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Logging Configuration
logging:
  level:
    com.campus.wall: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

app:
  storage:
    primary-provider: ${STORAGE_PRIMARY_PROVIDER:LOCAL}
    fallback-provider: ${STORAGE_FALLBACK_PROVIDER:LOCAL}
    local-public-enabled: ${LOCAL_PUBLIC_ENABLED:false}
    signing-secret: ${STORAGE_SIGNING_SECRET:}
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:8}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:200}
    thread-name-prefix: ${ASYNC_THREAD_NAME_PREFIX:async-}
    rejection-policy: ${ASYNC_REJECTION_POLICY:caller-runs}
  file:
    orphan-clean-cron: ${FILE_ORPHAN_CLEAN_CRON:0 30 3 * * ?}
    cleanup:
      mark-orphan-hours: ${FILE_ORPHAN_MARK_HOURS:24}
      retain-days: ${FILE_ORPHAN_RETAIN_DAYS:7}
      delete-limit: ${FILE_ORPHAN_DELETE_LIMIT:200}
  anonymous-cache:
    ttl-ms: ${ANON_CACHE_TTL_MS:3600000}
    cleanup-interval-ms: ${ANON_CACHE_CLEAN_INTERVAL_MS:600000}
  notice:
    sanitize-on-startup: ${NOTICE_SANITIZE_ON_STARTUP:false}
  security:
    # 加密密钥（用于SMTP密码等敏感信息加密，生产环境必须配置）
    crypto-key: ${CAMPUS_CRYPTO_KEY:}
    super-admin-role-key: ${SUPER_ADMIN_ROLE_KEY:console}
    api-public-permission-key: ${API_PUBLIC_PERMISSION_KEY:public}
    api-login-permission-key: ${API_LOGIN_PERMISSION_KEY:login}
    api-default-mode: ${API_DEFAULT_MODE:login}
    api-bootstrap-mode: ${API_BOOTSTRAP_MODE:login}
    fail-fast-secrets: ${SECURITY_FAIL_FAST_SECRETS:true}
    fail-fast-permissions: ${SECURITY_FAIL_FAST_PERMISSIONS:true}
    permission-cache-ttl-seconds: ${PERMISSION_CACHE_TTL_SECONDS:1800}
    permission-cache-max-size: ${PERMISSION_CACHE_MAX_SIZE:20000}

# CORS（生产环境建议配置为官网域名，例如 https://campus.example.com）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
