name: Frontend Console Guard

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  console-alignment:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Console alignment check
        run: pnpm run check:console-align

      - name: Frontend build checks
        run: pnpm run build
